name: Docs

# Build the Doxygen html and publish it to GitHub Pages
# (https://dyronix.github.io/the-dyro-engine/). Runs when a version tag is
# pushed, or on demand from the Actions tab. The generated html is no longer
# committed to the repo; this workflow is what students read.
#
# One-time setup: GitHub -> Settings -> Pages -> Build and deployment ->
# Source = "GitHub Actions".

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Allow the deploy step to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin the Doxygen version. docs/header.html is a custom HTML_HEADER
      # generated for a specific Doxygen release; feeding it to a different
      # version leaves template tokens like $mermaidjs un-substituted and
      # breaks the treeview sidebar and search box. apt ships an old Doxygen
      # (1.9.x on the runners), so download the matching release binary
      # instead. Keep DOXYGEN_VERSION in sync with the version noted at the
      # top of docs/header.html when you regenerate that header.
      #
      # No graphviz needed: the Doxyfile sets HAVE_DOT = NO and the
      # doxygen-awesome theme is committed under docs/doxygen-awesome/.
      - name: Install Doxygen
        env:
          DOXYGEN_VERSION: "1.17.0"
        run: |
          curl -fsSL "https://github.com/doxygen/doxygen/releases/download/Release_${DOXYGEN_VERSION//./_}/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz" -o doxygen.tar.gz
          tar -xzf doxygen.tar.gz
          sudo make -C "doxygen-${DOXYGEN_VERSION}" install
          doxygen --version

      # Same command as docs/generate_docs.bat and the CMake "docs" target.
      # The Doxyfile uses paths relative to docs/, so run it from there; output
      # lands in docs/html.
      - name: Build docs
        working-directory: docs
        run: doxygen Doxyfile

      # Static site: skip Jekyll so files/dirs beginning with "_" are served.
      - name: Disable Jekyll
        run: touch docs/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
