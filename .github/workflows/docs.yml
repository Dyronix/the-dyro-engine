name: Docs

# Build the Doxygen html and publish it to GitHub Pages
# (https://dyronix.github.io/buz-engine/). Runs when a version tag is
# pushed, or on demand from the Actions tab. The generated html is no longer
# committed to the repo; this workflow is what students read.
#
# One-time setup: GitHub -> Settings -> Pages -> Build and deployment ->
# Source = "GitHub Actions".

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Allow the deploy step to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin the Doxygen version. docs/header.html is a custom HTML_HEADER
      # generated for a specific Doxygen release; feeding it to a different
      # version leaves template tokens like $mermaidjs un-substituted and
      # breaks the treeview sidebar and search box. apt ships an old Doxygen
      # (1.9.x on the runners), so download the matching release binary
      # instead. Keep DOXYGEN_VERSION in sync with the version noted at the
      # top of docs/header.html when you regenerate that header.
      #
      # No graphviz needed: the Doxyfile sets HAVE_DOT = NO and the
      # doxygen-awesome theme is committed under docs/doxygen-awesome/.
      - name: Install Doxygen
        env:
          DOXYGEN_VERSION: "1.17.0"
        run: |
          curl -fsSL "https://github.com/doxygen/doxygen/releases/download/Release_${DOXYGEN_VERSION//./_}/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz" -o doxygen.tar.gz
          tar -xzf doxygen.tar.gz
          sudo make -C "doxygen-${DOXYGEN_VERSION}" install
          doxygen --version

      # Same steps as docs/generate_docs.bat. The Doxyfile uses paths relative
      # to docs/, so run it from there. The generated API reference lands in
      # docs/html/reference (see OUTPUT_DIRECTORY / HTML_OUTPUT).
      - name: Build reference
        working-directory: docs
        run: doxygen Doxyfile

      # Render the guide pages (docs/pages/*.md) into the front-website style
      # under docs/html/guides. Standard-library python only, no pip install.
      # Runs after Doxygen so it can cross-link into the reference class pages.
      - name: Build guides
        working-directory: docs
        run: python3 build_guides.py

      # Overlay the hand-written front website (landing + about + shared css)
      # onto the output so it sits at the site root, with the guides under
      # /guides/ and the reference under /reference/. Mirrors generate_docs.bat.
      - name: Assemble front website
        run: cp -r docs/site/. docs/html/

      # Static site: skip Jekyll so files/dirs beginning with "_" are served.
      - name: Disable Jekyll
        run: touch docs/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
